<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>У меня к тебе вопрос... ✨</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #ffe5ec; min-height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .card { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 400px; width: 100%; }
        h1 { color: #ff4b6e; font-size: 22px; margin-bottom: 10px; }
        p { color: #4a4a4a; font-size: 15px; margin-bottom: 20px; line-height: 1.4; }
        .btn-group { display: flex; justify-content: center; gap: 15px; position: relative; height: 45px; }
        button, .btn-link { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 25px; cursor: pointer; display: inline-block; text-decoration: none; }
        #yesBtn, .btn-link { background: #ff4b6e; color: white; }
        #noBtn { background: #f0f0f0; color: #666; position: absolute; left: 55%; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Экран 1 -->
        <div id="inviteScreen">
            <div style="font-size: 50px; margin-bottom: 10px;">🐱</div>
            <h1>Пойдешь со мной на свидание? ☕</h1>
            <p>Обещаю отличный вечер и классное настроение!</p>
            <div class="btn-group">
                <button id="yesBtn" onclick="showForm()">Да! ❤️</button>
                <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">Нет 😢</button>
            </div>
        </div>

        <!-- Экран 2 -->
        <div id="successScreen" class="hidden">
            <h2>Ура! 🎉</h2>
            <p>Нажми на кнопку ниже, чтобы открыть Telegram и подтвердить встречу:</p>
            <!-- Официальная и самая надежная ссылка -->
            <a class="btn-link" href="https://t.me" target="_blank">Открыть Telegram 🚀</a>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        function moveButton() {
            const x = (Math.random() - 0.5) * 160;
            const y = (Math.random() - 0.5) * 80;
            if (noBtn) noBtn.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
        }

        function showForm() {
            document.getElementById('inviteScreen').classList.add('hidden');
            document.getElementById('successScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
