<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>У меня к тебе вопрос... ✨</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #ffe5ec; min-height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .card { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 400px; width: 100%; }
        h1 { color: #ff4b6e; font-size: 22px; margin-bottom: 10px; }
        p { color: #4a4a4a; font-size: 15px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { text-align: left; margin-bottom: 12px; }
        label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ffe5ec; border-radius: 10px; font-size: 14px; outline: none; background: #fff; }
        input:focus, select:focus { border-color: #ff4b6e; }
        .btn-link { display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: bold; border: none; border-radius: 25px; background: #ff4b6e; color: white; text-decoration: none; text-align: center; margin-top: 20px; box-shadow: 0 4px 15px rgba(255, 75, 110, 0.3); cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 50px; margin-bottom: 10px;">🐱</div>
        <h1>Давай спланируем свидание? 🥰</h1>
        <p>Выбери параметры встречи, которые тебе удобны, и отправь мне в Telegram:</p>
        
        <!-- Поля выбора ответов -->
        <div class="form-group">
            <label>Когда тебе удобно?</label>
            <input type="date" id="dateInput">
        </div>
        
        <div class="form-group">
            <label>Во сколько встретимся?</label>
            <input type="time" id="timeInput">
        </div>
        
        <div class="form-group">
            <label>Куда мы пойдем?</label>
            <select id="activityInput">
                <option value="В кино 🍿">В кино 🍿</option>
                <option value="Прогулка 🌳">Просто гулять 🌳</option>
                <option value="Выставка 🎨">На выставку 🎨</option>
                <option value="Сюрприз ✨">Пусть будет сюрприз! ✨</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>What бы ты хотела поесть?</label>
            <input type="text" id="foodInput" placeholder="Суши, пицца, паста, бургеры...">
        </div>

        <!-- Кнопка отправки в Telegram -->
        <a id="tgShareLink" class="btn-link" href="#" onclick="generateTelegramShareLink(event)" target="_blank">Отправить ответ мне в Telegram 🚀</a>
    </div>

    <script>
        // Автоматически ставим текущую дату в поле при загрузке
        document.getElementById('dateInput').valueAsDate = new Date();

        function generateTelegramShareLink(e) {
            const date = document.getElementById('dateInput').value;
            const time = document.getElementById('timeInput').value;
            const activity = document.getElementById('activityInput').value;
            const food = document.getElementById('foodInput').value || 'Выберем вместе';

            // Формируем красивый текст со всеми заполненными параметрами
            const text = 'Привет! Я согласна на свидание! 🥰\n🗓 Дата: ' + date + '\n🕒 Время: ' + time + '\n📍 Куда идем: ' + activity + '\n🍕 Покушать: ' + food;
            const encodedText = encodeURIComponent(text);

            // Используем официальный шлюз "Поделиться", который открывает приложение и вставляет заготовленный текст
            document.getElementById('tgShareLink').href = 'https://t.me' + encodedText;
        }
    </script>
</body>
</html>
