<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>У меня к тебе вопрос... ✨</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #ffe5ec; min-height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .card { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 400px; width: 100%; }
        h1, h2 { color: #ff4b6e; font-size: 22px; margin-bottom: 10px; }
        p { color: #4a4a4a; font-size: 15px; margin-bottom: 20px; line-height: 1.4; }
        .btn-group { display: flex; justify-content: center; gap: 15px; position: relative; height: 45px; }
        button, .btn-link { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 25px; cursor: pointer; display: inline-block; text-decoration: none; }
        #yesBtn, .btn-link { background: #ff4b6e; color: white; }
        #noBtn { background: #f0f0f0; color: #666; position: absolute; left: 55%; }
        .form-group { text-align: left; margin-bottom: 12px; }
        label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 2px solid #ffe5ec; border-radius: 10px; font-size: 14px; outline: none; }
        input:focus, select:focus { border-color: #ff4b6e; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Экран 1 -->
        <div id="inviteScreen">
            <div style="font-size: 50px; margin-bottom: 10px;">🐱</div>
            <h1>Пойдешь со мной на свидание? ☕</h1>
            <p>Обещаю отличный вечер и классное настроение!</p>
            <div class="btn-group">
                <button id="yesBtn" onclick="showForm()">Да! ❤️</button>
                <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">Нет 😢</button>
            </div>
        </div>

        <!-- Экран 2 -->
        <div id="formScreen" class="hidden">
            <h2>Давай спланируем 🥰</h2>
            <p>Выбери параметры, а я всё организую:</p>
            <div class="form-group">
                <label>Когда тебе удобно?</label>
                <input type="date" id="dateInput">
            </div>
            <div class="form-group"><label>Во сколько?</label><input type="time" id="timeInput"></div>
            <div class="form-group">
                <label>Куда пойдем?</label>
                <select id="activityInput">
                    <option value="В кино 🍿">В кино 🍿</option>
                    <option value="Прогулка 🌳">Просто гулять 🌳</option>
                    <option value="Выставка 🎨">На выставку 🎨</option>
                    <option value="Сюрприз ✨">Пусть будет сюрприз! ✨</option>
                </select>
            </div>
            <div class="form-group"><label>Что бы ты хотела поесть?</label><input type="text" id="foodInput" placeholder="Суши, пицца, паста..."></div>
            <button id="yesBtn" style="width: 100%; margin-top: 10px;" onclick="generateTelegramLink()">Подтвердить план ✨</button>
        </div>

        <!-- Экран 3 -->
        <div id="successScreen" class="hidden">
            <h2>Почти готово! 🎉</h2>
            <p>Нажми кнопку ниже, чтобы отправить этот план мне в Telegram:</p>
            <a id="tgLink" class="btn-link" href="#" target="_blank">Отправить ответ в ТГ 🚀</a>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        function moveButton() {
            const x = (Math.random() - 0.5) * 160;
            const y = (Math.random() - 0.5) * 80;
            if (noBtn) noBtn.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
        }

        function showForm() {
            document.getElementById('inviteScreen').classList.add('hidden');
            document.getElementById('formScreen').classList.remove('hidden');
            document.getElementById('dateInput').valueAsDate = new Date();
        }

        function generateTelegramLink() {
            const date = document.getElementById('dateInput').value;
            const time = document.getElementById('timeInput').value;
            const activity = document.getElementById('activityInput').value;
            const food = document.getElementById('foodInput').value || 'Выберем вместе';

            // Формируем текст ответа без капризных символов
            const text = 'Привет! Я согласна на свидание! 🥰\n🗓 Дата: ' + date + '\n🕒 Время: ' + time + '\n📍 Куда идем: ' + activity + '\n🍕 Покушать: ' + food;
            
            // Надежная склейка ссылки для любого браузера
            const encodedText = encodeURIComponent(text);
            document.getElementById('tgLink').href = 'https://t.me' + encodedText;

            document.getElementById('formScreen').classList.add('hidden');
            document.getElementById('successScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
